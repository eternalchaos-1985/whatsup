services:
  - type: web
    name: whatsup-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: https://whatsup-civic.web.app
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: NASA_FIRMS_MAP_KEY
        sync: false
      - key: IQAIR_API_KEY
        sync: false
      - key: GOOGLE_CIVIC_API_KEY
        sync: false
      - key: POLL_INTERVAL_MS
        value: "180000"
